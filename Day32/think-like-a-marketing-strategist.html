<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Think Like a Marketing Strategist: Grow This Brand</title>
<style>
  :root{
    --bg: #0b0e10;
    --bg-panel: #12161a;
    --bg-panel-2: #171c21;
    --line: #262d33;
    --ink: #e9edf1;
    --ink-dim: #9aa6b0;
    --ink-faint: #5f6b74;
    --signal: #ffb545;
    --signal-dim: #5c4520;
    --ok: #5ee6a8;
    --bad: #ff6b6b;
    --info: #6ec6ff;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased;}
  body{min-height:100vh;}
  #root{min-height:100vh; display:flex; flex-direction:column;}

  ::selection{background:var(--signal); color:#0b0e10;}

  .app-shell{
    max-width: 920px;
    margin: 0 auto;
    width: 100%;
    padding: 28px 20px 80px;
    flex:1;
  }

  .topbar{
    position:sticky; top:0; z-index:50;
    background: rgba(11,14,16,0.9);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner{
    max-width:920px; margin:0 auto; padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between; gap:16px;
  }
  .brand-mark{
    display:flex; align-items:center; gap:10px;
    font-family: var(--mono);
    font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-dim);
  }
  .brand-mark .dot{width:8px; height:8px; border-radius:50%; background:var(--signal); box-shadow:0 0 10px var(--signal);}

  .stage-track{ display:flex; gap:6px; align-items:center; }
  .stage-dot{
    width:7px; height:7px; border-radius:50%; background:var(--line); transition: all .3s ease;
  }
  .stage-dot.active{ background:var(--signal); box-shadow:0 0 8px var(--signal); width:20px; border-radius:4px; }
  .stage-dot.done{ background:var(--ok); }

  h1,h2,h3{ font-family: var(--sans); letter-spacing:-0.01em; }
  .eyebrow{
    font-family: var(--mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--signal); margin-bottom:10px; display:flex; align-items:center; gap:8px;
  }
  .eyebrow::before{ content:''; width:16px; height:1px; background:var(--signal); }

  .headline{ font-size:32px; font-weight:700; line-height:1.15; margin-bottom:14px; }
  .sub{ font-size:16px; color:var(--ink-dim); line-height:1.6; margin-bottom:22px; max-width:640px; }

  .card{
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px;
    margin-bottom:18px;
    animation: fadeUp .45s ease both;
  }
  .card.tight{padding:16px 18px;}

  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .fade-in{ animation: fadeUp .45s ease both; }

  .grid{ display:grid; gap:14px; }
  .grid-2{ grid-template-columns: 1fr 1fr; }
  .grid-3{ grid-template-columns: repeat(3,1fr); }
  @media (max-width:720px){
    .grid-2, .grid-3{ grid-template-columns: 1fr; }
    .headline{ font-size:26px; }
  }

  .choice-card{
    background: var(--bg-panel-2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
    cursor:pointer;
    transition: transform .18s ease, border-color .18s ease, background .18s ease;
    text-align:left;
    color: var(--ink);
    display:flex; flex-direction:column; gap:8px;
  }
  .choice-card:hover{ transform: translateY(-3px); border-color: var(--signal); background:#1b2127; }
  .choice-card .icon{ font-size:26px; }
  .choice-card .ctitle{ font-weight:700; font-size:16px; }
  .choice-card .cdesc{ font-size:13px; color:var(--ink-dim); line-height:1.5; }

  .choice-card.selected{ border-color: var(--signal); background:#1e1710; box-shadow: 0 0 0 1px var(--signal) inset; }
  .choice-card.locked-out{ opacity:0.35; cursor:not-allowed; }
  .choice-card.locked-out:hover{ transform:none; border-color:var(--line); }

  button{ font-family: var(--sans); cursor:pointer; border:none; }
  .btn{
    background: var(--signal);
    color: #1a1204;
    font-weight:700;
    font-size:14px;
    padding: 12px 22px;
    border-radius: 9px;
    transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    display:inline-flex; align-items:center; gap:8px;
  }
  .btn:hover{ transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,181,69,0.25); }
  .btn:disabled{ opacity:0.3; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn.ghost{
    background:transparent; color:var(--ink); border:1px solid var(--line);
    font-weight:600;
  }
  .btn.ghost:hover{ border-color: var(--ink-dim); box-shadow:none; }
  .btn.small{ padding:8px 14px; font-size:12px; border-radius:7px; }

  .btn-row{ display:flex; gap:12px; margin-top: 22px; flex-wrap:wrap; }

  .tag{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--mono); font-size:11px; letter-spacing:0.04em;
    padding: 4px 9px; border-radius:6px;
    background: var(--bg-panel-2); border:1px solid var(--line); color:var(--ink-dim);
  }
  .tag.on{ background:var(--signal-dim); border-color:var(--signal); color:var(--signal); }

  .brief-row{ display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px dashed var(--line); font-size:14px; gap:16px; }
  .brief-row:last-child{ border-bottom:none; }
  .brief-label{ color:var(--ink-faint); font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.06em; min-width:120px; padding-top:2px;}
  .brief-value{ color:var(--ink); text-align:right; flex:1; line-height:1.5; }

  .platform-card{
    background:var(--bg-panel-2); border:1px solid var(--line); border-radius:12px; padding:18px;
    cursor:pointer; transition: border-color .18s ease, background .18s ease;
  }
  .platform-card:hover{ border-color:#3a4450; }
  .platform-card.chosen{ border-color:var(--ok); background:#101d17; }
  .platform-card.rejected{ opacity:0.5; }
  .platform-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .platform-name{ font-weight:700; font-size:15px; display:flex; align-items:center; gap:8px;}
  .fit-badge{ font-family:var(--mono); font-size:10px; padding:3px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:.05em;}
  .fit-high{ background:rgba(94,230,168,0.14); color:var(--ok); }
  .fit-mid{ background:rgba(110,198,255,0.14); color:var(--info); }
  .fit-low{ background:rgba(255,107,107,0.14); color:var(--bad); }
  .platform-why{ font-size:13px; color:var(--ink-dim); line-height:1.55; margin-top:6px; }
  .check-pill{ font-size:11px; font-family:var(--mono); color:var(--ok); }

  .pillar-card{
    background:var(--bg-panel-2); border:1px solid var(--line); border-radius:12px; padding:18px; cursor:pointer;
    transition:.18s ease; position:relative;
  }
  .pillar-card:hover{ border-color:#3a4450; }
  .pillar-card.chosen{ border-color:var(--signal); background:#1e1710; }
  .pillar-card .num{ font-family:var(--mono); font-size:11px; color:var(--ink-faint); }
  .pillar-card .ctitle{ font-weight:700; margin:6px 0; font-size:15px; }
  .pillar-card .cdesc{ font-size:13px; color:var(--ink-dim); line-height:1.5; margin-bottom:8px;}
  .pillar-goal{ font-family:var(--mono); font-size:10.5px; color:var(--info); text-transform:uppercase; letter-spacing:.04em;}

  .week-card{ background:var(--bg-panel-2); border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:12px; }
  .week-head{ display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .week-num{
    font-family:var(--mono); font-size:12px; background:var(--signal); color:#1a1204; font-weight:700;
    padding:3px 9px; border-radius:6px;
  }
  .week-title{ font-weight:700; font-size:15px; }
  .week-goal{ font-size:13.5px; color:var(--ink-dim); line-height:1.6; }

  .event-box{
    border:1px solid var(--signal); background: linear-gradient(180deg, #1e1710, var(--bg-panel));
    border-radius:14px; padding:24px;
  }
  .event-flash{ font-family:var(--mono); font-size:11px; color:var(--signal); text-transform:uppercase; letter-spacing:.12em; margin-bottom:10px;}
  .event-text{ font-size:15px; line-height:1.65; margin-bottom:18px; }

  .option-btn{
    display:block; width:100%; text-align:left; background:var(--bg-panel-2); border:1px solid var(--line);
    padding:14px 16px; border-radius:10px; margin-bottom:10px; color:var(--ink); font-size:14px; line-height:1.5;
    transition:.15s ease;
  }
  .option-btn:hover{ border-color:var(--signal); background:#1b1610; }
  .option-btn.picked{ border-color:var(--ok); background:#101d17; }

  .consequence{
    margin-top:14px; padding:14px 16px; border-radius:10px; background:var(--bg-panel-2); border-left:3px solid var(--info);
    font-size:14px; line-height:1.6; color:var(--ink-dim);
  }

  .claude-card{
    background: linear-gradient(135deg, #12161a, #161b20);
    border:1px dashed #3d4d5c;
    border-radius:12px; padding:16px 18px; margin-top:16px;
  }
  .claude-head{ display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--info); margin-bottom:10px;}
  .claude-prompt{
    background:#0d1013; border:1px solid var(--line); border-radius:8px; padding:12px 14px;
    font-family:var(--mono); font-size:12.5px; color:#cfe8ff; line-height:1.6; white-space:pre-wrap;
  }
  .copy-btn{
    margin-top:10px; background:transparent; border:1px solid var(--line); color:var(--ink-dim);
    font-size:11px; padding:6px 12px; border-radius:6px; font-family:var(--mono);
  }
  .copy-btn:hover{ border-color:var(--info); color:var(--info); }

  .progress-wrap{ height:3px; background:var(--line); border-radius:3px; overflow:hidden; margin-bottom:26px; }
  .progress-bar{ height:100%; background: linear-gradient(90deg, var(--signal), var(--ok)); transition: width .5s ease; }

  .report-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:720px){ .report-grid{ grid-template-columns:1fr; } }
  .report-item{ background:var(--bg-panel-2); border:1px solid var(--line); border-radius:12px; padding:16px 18px;}
  .report-item h4{ font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--signal); font-family:var(--mono); margin-bottom:8px;}
  .report-item p{ font-size:13.5px; color:var(--ink-dim); line-height:1.6; }

  .lesson{ display:flex; gap:12px; padding:12px 0; border-bottom:1px dashed var(--line); }
  .lesson:last-child{ border-bottom:none; }
  .lesson-num{ font-family:var(--mono); color:var(--signal); font-weight:700; font-size:14px; min-width:22px;}

  .footer-note{ text-align:center; color:var(--ink-faint); font-size:12px; margin-top:40px; font-family:var(--mono); }

  .why-toggle{
    font-family:var(--mono); font-size:11px; color:var(--info); cursor:pointer; display:inline-flex;
    align-items:center; gap:5px; margin-top:4px; user-select:none;
  }
  .why-panel{ font-size:13px; color:var(--ink-dim); line-height:1.6; margin-top:8px; padding-top:8px; border-top:1px dashed var(--line);}

  input[type=text], textarea{
    width:100%; background:var(--bg-panel-2); border:1px solid var(--line); color:var(--ink);
    padding:12px 14px; border-radius:9px; font-family:var(--sans); font-size:14px; margin-bottom:12px;
  }
  input[type=text]:focus, textarea:focus{ outline:none; border-color:var(--signal); }
  label.field-label{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-faint); display:block; margin-bottom:6px;}

  .score-pill{
    font-family:var(--mono); font-size:11px; padding:4px 10px; border-radius:20px; font-weight:700;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const {useState, useMemo, useCallback} = React;

/* ---------------- DATA GENERATORS ---------------- */

const INDUSTRIES = [
  {name:"Cold-brew coffee subscription", audience:"Busy young professionals, 24-35, who value convenience and quality", challenge:"Customers churn after 2 months because they forget why they subscribed"},
  {name:"Handmade ceramic homeware", audience:"Design-conscious renters, 26-40, who follow home-decor accounts", challenge:"Beautiful product, but almost nobody outside their city has heard of them"},
  {name:"Budget fitness app for beginners", audience:"Adults 30-50 who've tried and quit gyms before", challenge:"Huge app-store competition; hard to explain why this one is different"},
  {name:"Sustainable kids' clothing brand", audience:"Millennial parents who care about ethics and durability", challenge:"Price is 2x fast fashion and parents question if it's worth it"},
  {name:"Local bakery going national online", audience:"Nostalgic dessert lovers, gifting occasions, 25-55", challenge:"Shipping is expensive and reviews mention 'not as fresh as in-store'"},
  {name:"B2B invoicing software for freelancers", audience:"Solo freelancers and small agencies who hate admin work", challenge:"Everyone thinks 'just use a spreadsheet' instead of paying for this"},
  {name:"Plant-based protein bar startup", audience:"Gym-goers and students who want a cheap, tasty snack", challenge:"Shelves are crowded with 40 similar-looking bars"},
  {name:"Independent bookstore with a cafe", audience:"Local readers, students, remote workers who need a 'third place'", challenge:"Foot traffic is falling because people default to online shopping"},
  {name:"Pet grooming mobile van service", audience:"Time-poor pet owners in suburban areas", challenge:"People don't know mobile grooming is even an option that exists"},
  {name:"Online course platform for career switchers", audience:"Adults 28-45 stuck in jobs they want to leave", challenge:"Low course completion rates hurt word-of-mouth and refunds are rising"},
];

const BUDGETS = ["Very tight (under $500/month)", "Modest ($500-2,000/month)", "Comfortable ($2,000-10,000/month)", "Well-funded ($10,000+/month)"];

const COMPETITOR_SETS = [
  ["a bigger national chain with huge ad spend", "a scrappy local competitor with a loyal fanbase"],
  ["a venture-funded startup burning cash on ads", "an old-school player with brand trust but boring marketing"],
  ["three near-identical competitors all fighting on price", "one premium competitor nobody can quite outclass on quality"],
];

function randomBusiness(seed){
  const ind = INDUSTRIES[seed % INDUSTRIES.length];
  const budget = BUDGETS[(seed*3) % BUDGETS.length];
  const comps = COMPETITOR_SETS[(seed*7) % COMPETITOR_SETS.length];
  return {
    type: "business",
    name: ind.name,
    audience: ind.audience,
    budget,
    competitors: comps,
    challenge: ind.challenge,
  };
}

/* ---------------- PLATFORM + PILLAR DATA ---------------- */

function getPlatformPool(mode){
  const base = [
    {id:"instagram", name:"Instagram", icon:"📸",
      why:"Strong for visual products and lifestyle storytelling. Great for brand personality, weaker for deep explanation or B2B decision-makers."},
    {id:"tiktok", name:"TikTok", icon:"🎬",
      why:"Best for reach and discovery through short, entertaining video. Rewards consistency and trends, not polish. Riskier for very formal or B2B brands."},
    {id:"linkedin", name:"LinkedIn", icon:"💼",
      why:"Ideal for B2B products, expertise, and professional credibility. Weak for impulse-buy consumer products."},
    {id:"twitter", name:"X / Twitter", icon:"🐦",
      why:"Good for real-time conversation, opinions, and building a reputation in a niche. Less useful for products without something to say."},
    {id:"youtube", name:"YouTube", icon:"▶️",
      why:"Excellent for tutorials, storytelling, and long-term searchable content. Requires more production effort and time before payoff."},
    {id:"pinterest", name:"Pinterest", icon:"📌",
      why:"Strong for visually inspiring, aspirational products people plan around (home, food, fashion). Weak for services or B2B."},
    {id:"email", name:"Email Newsletter", icon:"✉️",
      why:"The highest-owned, most reliable channel — you're not at the mercy of an algorithm. Slower to grow, needs other channels to feed it."},
    {id:"facebook", name:"Facebook", icon:"📘",
      why:"Useful for local businesses, community groups, and older audiences. Increasingly weak for organic reach without paid boosting."},
  ];
  if(mode === "personal"){
    return base.map(p=>{
      if(["linkedin","twitter","youtube","email"].includes(p.id)){
        return {...p, weight:"high"};
      }
      if(["instagram","tiktok"].includes(p.id)) return {...p, weight:"mid"};
      return {...p, weight:"low"};
    });
  }
  // business mode: vary fit by a light heuristic based on nothing but keep variety
  return base.map((p,i)=>({...p, weight: i%3===0?"high": i%3===1?"mid":"low"}));
}

function getPillarPool(mode){
  if(mode === "personal"){
    return [
      {id:"thought", title:"Thought Leadership", goal:"Authority", desc:"Sharing your point of view on trends and ideas in your field — this is what makes people see you as an expert, not just a face."},
      {id:"story", title:"Personal Story", goal:"Connection", desc:"The turning points, failures, and lessons that make your journey relatable. People follow people, not resumes."},
      {id:"bts", title:"Behind the Scenes", goal:"Trust", desc:"Showing your actual process, workspace, or day-to-day. Reduces the gap between 'perfect online persona' and real human."},
      {id:"education", title:"Audience Education", goal:"Value", desc:"Teaching your audience something useful in your niche. This is what gets saved, shared, and brings in new followers."},
      {id:"community", title:"Community Highlights", goal:"Loyalty", desc:"Featuring your audience's questions, wins, or comments. Makes people feel seen and keeps them coming back."},
      {id:"pov", title:"Hot Takes / Opinions", goal:"Reach", desc:"Respectfully challenging common wisdom in your space. Sparks conversation and shares, but must stay authentic, not manufactured."},
    ];
  }
  return [
    {id:"product", title:"Product in Action", goal:"Consideration", desc:"Showing the product being used solves real doubts before someone buys. Moves people from curious to convinced."},
    {id:"social_proof", title:"Social Proof & Reviews", goal:"Trust", desc:"Real customers saying it worked. This is often the single biggest factor in a stranger's buying decision."},
    {id:"education", title:"Customer Education", goal:"Value", desc:"Helping your audience solve a problem your product touches — even if they're not ready to buy yet."},
    {id:"bts", title:"Behind the Scenes", goal:"Trust", desc:"How it's made, who makes it, what the team cares about. Turns a logo into a brand people root for."},
    {id:"offers", title:"Offers & Promotions", goal:"Conversion", desc:"Direct calls to purchase. Necessary, but if overused it trains your audience to only pay attention during sales."},
    {id:"community", title:"Community & UGC", goal:"Loyalty", desc:"Featuring customers and their content. Cheap to produce and builds a sense of belonging around the brand."},
  ];
}

/* ---------------- 30-DAY ROADMAP ---------------- */

function buildRoadmap(mode, pillars){
  if(mode === "personal"){
    return [
      {n:1, title:"Define Your POV & Optimize Your Profile", goal:"Nail your bio, headline, and photo so a stranger understands your niche in 5 seconds. Write down the one sentence that describes what you help people with."},
      {n:2, title:"Publish Your Origin Story", goal:`Introduce yourself properly using your "${pillars[0]?.title || 'core pillar'}" pillar. This is the post people will see when they check if you're 'real.'`},
      {n:3, title:"Establish a Rhythm", goal:"Post consistently using all three chosen pillars so your audience learns what to expect from you and when."},
      {n:4, title:"Engage & Expand", goal:"Reply to comments, engage in others' posts in your niche, and start tracking which pillar gets the most genuine response."},
    ];
  }
  return [
    {n:1, title:"Foundations: Audience & Messaging", goal:"Nail down who you're talking to and the one problem you solve better than anyone. Everything else builds on this."},
    {n:2, title:"Build Trust", goal:`Lean on your "${pillars[1]?.title || 'trust'}" pillar to reduce doubt — reviews, behind-the-scenes, and proof it works.`},
    {n:3, title:"Educate & Nurture", goal:"Give value before asking for the sale. This is where casual followers become people who actually consider buying."},
    {n:4, title:"Convert & Measure", goal:"Introduce a clear offer, watch what content actually drove action, and double down on what worked."},
  ];
}

/* ---------------- RANDOM EVENTS ---------------- */

function getEvent(mode, seed){
  const businessEvents = [
    {
      flash:"Unexpected Event: Viral Moment",
      text:"One of your posts unexpectedly goes viral overnight — 500,000 views, but your website crashes under the traffic and your DMs are flooded with questions your team can't keep up with.",
      options:[
        {label:"Pause ads, post an update acknowledging the moment, and fix the site first", consequence:"Smart move. Protecting the customer experience during a spike matters more than capturing every visitor. You lose a little momentum but keep your reputation intact."},
        {label:"Push hard on ads immediately to capitalize on the attention", consequence:"Risky. You get a short-term sales bump, but with the site still unstable, many buyers hit errors and leave frustrated reviews that undo the gain."},
        {label:"Ignore it and stick to the existing content calendar", consequence:"A missed opportunity. Virality is rare and short-lived — by the time you engage the moment has passed and most of that attention is gone for good."},
      ]
    },
    {
      flash:"Unexpected Event: A Competitor Copies You",
      text:"A close competitor launches a campaign that looks almost identical to one of your recent ideas, right down to the color palette and tagline structure.",
      options:[
        {label:"Call it out publicly and frame yourself as the original", consequence:"Can work if done with confidence and humor, but risks looking petty or starting a fight that distracts from your actual strengths."},
        {label:"Ignore it and double down on being distinct in other ways", consequence:"Steady and mature. Competitors copying you is often a signal you're doing something right — the smartest response is usually to keep innovating rather than react."},
        {label:"Copy their next move back, tit-for-tat", consequence:"This turns strategy into a reaction cycle. You lose your own voice and your audience starts to see both brands as interchangeable."},
      ]
    },
    {
      flash:"Unexpected Event: A Negative Review Goes Around",
      text:"A detailed, fair-but-harsh review of your product starts getting shared in relevant online communities, and people are asking your brand to respond.",
      options:[
        {label:"Respond publicly, acknowledge the valid points, and explain what you're changing", consequence:"This is usually the strongest path. Transparent, specific responses to criticism build more trust than silence or defensiveness ever could."},
        {label:"Stay silent and let it blow over", consequence:"Sometimes fine for small issues, but for a widely-shared review, silence often reads as not caring, which can do more damage than the original complaint."},
        {label:"Delete/hide the review and any mentions of it", consequence:"This almost always backfires. If discovered, it becomes a bigger story about censorship than the original complaint ever was."},
      ]
    },
  ];
  const personalEvents = [
    {
      flash:"Unexpected Event: A Post Goes Viral",
      text:"One of your posts on your strongest platform unexpectedly explodes — thousands of new followers in 48 hours, most of whom know nothing else about you yet.",
      options:[
        {label:"Pin a clear intro post and follow up with your best related content", consequence:"Great instinct. New followers decide fast whether to stay — giving them an easy next step turns a viral spike into lasting growth."},
        {label:"Post as much as possible while the algorithm favors you", consequence:"Tempting, but posting rushed, lower-quality content can actually hurt how the algorithm treats your account afterward, and confuse new followers about who you are."},
        {label:"Do nothing differently and let the moment pass", consequence:"A missed opportunity — most of these new followers will quietly drift away without ever learning what you're actually about."},
      ]
    },
    {
      flash:"Unexpected Event: A Podcast Invite",
      text:"A podcast in your niche, bigger than your current audience, invites you on as a guest with almost no notice.",
      options:[
        {label:"Say yes and prepare 3 sharp, story-driven talking points", consequence:"Excellent — going in with a few clear, memorable stories (not a script) is what makes guest appearances actually convert listeners into followers."},
        {label:"Say yes but wing it with no prep", consequence:"Risky. Without a few clear points ready, it's easy to ramble, and listeners are less likely to remember who you are afterward."},
        {label:"Decline because you don't feel ready yet", consequence:"Understandable, but opportunities like this are rare and don't wait. Turning it down often means waiting a long time for a similarly-sized one."},
      ]
    },
    {
      flash:"Unexpected Event: Someone Copies Your Content",
      text:"You notice another creator in your niche has posted something almost identical to your idea, word for word in places, just days after you did.",
      options:[
        {label:"Call it out directly and publicly", consequence:"Can build short-term sympathy, but often reads as insecure and shifts focus away from your actual work and expertise."},
        {label:"Keep creating and let your consistency speak for itself", consequence:"The stronger long-term play. Being copied is often proof of relevance — your original voice and consistency are what audiences ultimately trust."},
        {label:"Message them privately and address it directly", consequence:"A mature middle ground. It resolves the issue without a public spectacle, and sometimes even opens the door to a respectful relationship."},
      ]
    },
  ];
  const pool = mode === "personal" ? personalEvents : businessEvents;
  return pool[seed % pool.length];
}

/* ---------------- CLAUDE PROMPT CARD ---------------- */

function ClaudeCard({title, prompt}){
  const [copied, setCopied] = useState(false);
  const doCopy = () => {
    const ta = document.createElement("textarea");
    ta.value = prompt;
    document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand("copy"); }catch(e){}
    document.body.removeChild(ta);
    setCopied(true);
    setTimeout(()=>setCopied(false), 1500);
  };
  return (
    <div className="claude-card">
      <div className="claude-head">🤖 How to ask Claude — {title}</div>
      <div className="claude-prompt">{prompt}</div>
      <button className="copy-btn" onClick={doCopy}>{copied ? "✓ copied" : "copy prompt"}</button>
    </div>
  );
}

/* ---------------- PROGRESS ---------------- */

const STAGES = ["welcome","mode","brief","platforms","pillars","roadmap","event","report"];

function TopBar({stageIndex}){
  return (
    <div className="topbar">
      <div className="topbar-inner">
        <div className="brand-mark"><span className="dot"></span> Marketing Strategist Sim</div>
        <div className="stage-track">
          {STAGES.map((s,i)=>(
            <div key={s} className={"stage-dot " + (i===stageIndex ? "active" : i<stageIndex ? "done":"")}></div>
          ))}
        </div>
      </div>
    </div>

}

function ProgressBar({stageIndex}){
  const pct = Math.round(((stageIndex)/(STAGES.length-1))*100);
  return (
    <div className="progress-wrap"><div className="progress-bar" style={{width: pct+"%"}}></div></div>
  );
}

/* ---------------- MAIN APP ---------------- */

function App(){
  const [stage, setStage] = useState("welcome");
  const [mode, setMode] = useState(null); // "business" | "personal" | "random"
  const [brief, setBrief] = useState(null);
  const [personalInput, setPersonalInput] = useState({name:"", niche:"", story:""});
  const [ownBusinessInput, setOwnBusinessInput] = useState({name:"", audience:"", product:""});
  const [selectedPlatforms, setSelectedPlatforms] = useState([]);
  const [selectedPillars, setSelectedPillars] = useState([]);
  const [eventChoice, setEventChoice] = useState(null);
  const [seed] = useState(()=>Math.floor(Math.random()*10000));

  const platformPool = useMemo(()=>getPlatformPool(mode==="personal"?"personal":"business"), [mode]);
  const pillarPool = useMemo(()=>getPillarPool(mode==="personal"?"personal":"business"), [mode]);
  const eventData = useMemo(()=>getEvent(mode==="personal"?"personal":"business", seed), [mode, seed]);

  const stageIndex = STAGES.indexOf(stage);

  const goTo = (s) => { setStage(s); window.scrollTo({top:0, behavior:"smooth"}); };

  const chosenPillarObjs = pillarPool.filter(p=>selectedPillars.includes(p.id));
  const roadmap = useMemo(()=> brief ? buildRoadmap(mode==="personal"?"personal":"business", chosenPillarObjs) : [], [brief, selectedPillars, mode]);

  const restart = () => {
    setMode(null); setBrief(null); setSelectedPlatforms([]); setSelectedPillars([]);
    setEventChoice(null); setPersonalInput({name:"",niche:"",story:""});
    setOwnBusinessInput({name:"",audience:"",product:""});
    goTo("welcome");
  };

  const newRandomClient = () => {
    const s = Math.floor(Math.random()*10000);
    setMode("random");
    setBrief(randomBusiness(s));
    setSelectedPlatforms([]); setSelectedPillars([]); setEventChoice(null);
    goTo("brief");
  };

  return (
    <React.Fragment>
      <TopBar stageIndex={stageIndex} />
      <div className="app-shell">
        <ProgressBar stageIndex={stageIndex} />

        {stage === "welcome" && <Welcome onStart={()=>goTo("mode")} />}

        {stage === "mode" && (
          <ModeSelect
            onPickBusiness={()=>{ setMode("business"); }}
            onPickPersonal={()=>{ setMode("personal"); }}
            onPickRandom={newRandomClient}
            mode={mode}
            ownBusinessInput={ownBusinessInput}
            setOwnBusinessInput={setOwnBusinessInput}
            personalInput={personalInput}
            setPersonalInput={setPersonalInput}
            onConfirmBusiness={()=>{
              setBrief({
                type:"business",
                name: ownBusinessInput.name || "Your Business",
                audience: ownBusinessInput.audience || "Describe your ideal customer here",
                budget: "Set by you",
                competitors: ["people you see as direct competition"],
                challenge: ownBusinessInput.product || "Define your biggest marketing challenge",
                custom:true,
              });
              goTo("brief");
            }}
            onConfirmPersonal={()=>{
              setBrief({
                type:"personal",
                name: personalInput.name || "Your Name",
                niche: personalInput.niche || "Your area of expertise",
                story: personalInput.story || "Your story so far",
              });
              goTo("brief");
            }}
          />
        )}

        {stage === "brief" && brief && (
          <BriefStage
            mode={mode}
            brief={brief}
            onNext={()=>goTo("platforms")}
          />
        )}

        {stage === "platforms" && (
          <PlatformStage
            mode={mode}
            pool={platformPool}
            selected={selectedPlatforms}
            setSelected={setSelectedPlatforms}
            brief={brief}
            onNext={()=>goTo("pillars")}
          />
        )}

        {stage === "pillars" && (
          <PillarStage
            mode={mode}
            pool={pillarPool}
            selected={selectedPillars}
            setSelected={setSelectedPillars}
            brief={brief}
            onNext={()=>goTo("roadmap")}
          />
        )}

        {stage === "roadmap" && (
          <RoadmapStage
            mode={mode}
            roadmap={roadmap}
            brief={brief}
            onNext={()=>goTo("event")}
          />
        )}

        {stage === "event" && (
          <EventStage
            mode={mode}
            eventData={eventData}
            eventChoice={eventChoice}
            setEventChoice={setEventChoice}
            brief={brief}
            onNext={()=>goTo("report")}
          />
        )}

        {stage === "report" && (
          <ReportStage
            mode={mode}
            brief={brief}
            selectedPlatforms={selectedPlatforms}
            platformPool={platformPool}
            selectedPillars={selectedPillars}
            pillarPool={pillarPool}
            eventData={eventData}
            eventChoice={eventChoice}
            onRestart={restart}
            onNewRandom={newRandomClient}
          />
        )}

        <div className="footer-note">THINK LIKE A MARKETING STRATEGIST — a learning simulation, not real marketing advice</div>
      </div>
    </React.Fragment>
  );
}

/* ---------------- PLATFORM STAGE ---------------- */

function PlatformStage({mode, pool, selected, setSelected, brief, onNext}){
  const isPersonal = mode === "personal";
  const [openWhy, setOpenWhy] = useState({});

  const toggle = (id) => {
    setSelected(sel => sel.includes(id) ? sel.filter(x=>x!==id) : [...sel, id]);
  };
  const toggleWhy = (id) => setOpenWhy(w=>({...w, [id]: !w[id]}));

  const canProceed = selected.length >= 1;

  return (
    <div className="fade-in">
      <div className="eyebrow">Step 3 · Platform Strategy</div>
      <h2 className="headline" style={{fontSize:26}}>Where should {isPersonal ? brief.name : brief.name} actually show up?</h2>
      <p className="sub">
        Being everywhere is how brands run out of energy and post inconsistently everywhere. A strategist picks a
        few platforms based on fit, not habit or hype. Tap the platforms you'd choose, then check "why" to see if you agree with the reasoning.
      </p>

      <div className="grid grid-2">
        {pool.map(p=>{
          const chosen = selected.includes(p.id);
          const fitClass = p.weight === "high" ? "fit-high" : p.weight === "mid" ? "fit-mid" : "fit-low";
          const fitLabel = p.weight === "high" ? "Strong Fit" : p.weight === "mid" ? "Situational" : "Weak Fit";
          return (
            <div key={p.id} className={"platform-card " + (chosen ? "chosen":"")} onClick={()=>toggle(p.id)}>
              <div className="platform-head">
                <div className="platform-name">{p.icon} {p.name}</div>
                <div className={"fit-badge " + fitClass}>{fitLabel}</div>
              </div>
              {chosen && <div className="check-pill">✓ selected for this brand</div>}
              <div className="why-toggle" onClick={(e)=>{ e.stopPropagation(); toggleWhy(p.id); }}>
                {openWhy[p.id] ? "▾ hide reasoning" : "▸ why this rating?"}
              </div>
              {openWhy[p.id] && <div className="why-panel">{p.why}</div>}
            </div>
          );
        })}
      </div>

      <div className="card" style={{marginTop:18}}>
        <div className="eyebrow" style={{marginBottom:8}}>Why this step matters</div>
        <p style={{fontSize:14, color:"var(--ink-dim)", lineHeight:1.6}}>
          {isPersonal
            ? "For personal brands, LinkedIn, X/Twitter, YouTube, and email newsletters tend to reward expertise and consistency more than raw entertainment value — which is usually a better long-term fit than chasing viral reach alone."
            : "Platform choice should follow the audience, not the brand's preference. A product with a tight budget shouldn't spread itself across five platforms it can't sustain — better to dominate one or two well."}
        </p>
      </div>

      <ClaudeCard
        title="Choosing the right platforms"
        prompt={isPersonal
          ? `I'm building a personal brand as ${brief.name} in ${brief.niche}. Which 2-3 platforms should I focus on first, and why, given that I have limited time each week?`
          : `For a business selling to ${brief.audience} with a budget of ${brief.budget}, which platforms would you prioritize and why? Please explain the tradeoffs of each.`}
      />

      <div className="btn-row">
        <button className="btn" disabled={!canProceed} onClick={onNext}>
          {canProceed ? `Continue with ${selected.length} platform${selected.length>1?"s":""} →` : "Select at least 1 platform"}
        </button>
      </div>
    </div>
  );
}

/* ---------------- PILLAR STAGE ---------------- */

function PillarStage({mode, pool, selected, setSelected, brief, onNext}){
  const isPersonal = mode === "personal";
  const toggle = (id) => {
    setSelected(sel=>{
      if(sel.includes(id)) return sel.filter(x=>x!==id);
      if(sel.length >= 3) return sel; // cap at 3
      return [...sel, id];
    });
  };
  const canProceed = selected.length === 3;

  return (
    <div className="fade-in">
      <div className="eyebrow">Step 4 · Content Pillars</div>
      <h2 className="headline" style={{fontSize:26}}>Pick exactly 3 content pillars</h2>
      <p className="sub">
        Content pillars are recurring themes, not individual posts. Strategists limit themselves on purpose:
        too many pillars means no clear identity and an unsustainable workload. Choose the 3 that best serve
        {isPersonal ? " your goals as a personal brand." : " this brand's audience and challenge."}
      </p>

      <div className="grid grid-3">
        {pool.map(p=>{
          const chosen = selected.includes(p.id);
          const disabled = !chosen && selected.length>=3;
          return (
            <div key={p.id} className={"pillar-card " + (chosen ? "chosen":"") + (disabled ? " locked-out":"")}
              onClick={()=>{ if(!disabled) toggle(p.id); }}>
              <div className="num">{chosen ? "✓ SELECTED" : "PILLAR"}</div>
              <div className="ctitle">{p.title}</div>
              <div className="cdesc">{p.desc}</div>
              <div className="pillar-goal">Primarily drives: {p.goal}</div>
            </div>
          );
        })}
      </div>

      <div className="card" style={{marginTop:18}}>
        <div className="eyebrow" style={{marginBottom:8}}>Why only 3?</div>
        <p style={{fontSize:14, color:"var(--ink-dim)", lineHeight:1.6}}>
          Each pillar you add multiplies the ideas, planning, and consistency needed to do it well. Three pillars is
          usually enough to balance different goals — like trust, education, and connection — without spreading
          {isPersonal ? " you" : " the team"} too thin to post consistently.
        </p>
      </div>

      <ClaudeCard
        title="Narrowing down content pillars"
        prompt={isPersonal
          ? `I'm ${brief.name}, building a personal brand in ${brief.niche}. Here are content pillar options: [list them]. Help me choose the 3 that balance authority, connection, and growth.`
          : `My business is ${brief.name}. Here are potential content pillars: [list them]. Which 3 would you prioritize for a brand facing this challenge: "${brief.challenge}"?`}
      />

      <div className="btn-row">
        <button className="btn" disabled={!canProceed} onClick={onNext}>
          {canProceed ? "Build the 30-Day Roadmap →" : `Select ${3-selected.length} more pillar${3-selected.length===1?"":"s"}`}
        </button>
      </div>
    </div>
  );
}

/* ---------------- ROADMAP STAGE ---------------- */

        <p style={{fontSize:14, color:"var(--ink-dim)", lineHeight:1.6}}>
          Planning every single post in advance often leads to rigid, stale content that ignores what's actually

      </div>
    </div>
  );
}

/* ---------------- EVENT STAGE ---------------- */

function EventStage({mode, eventData, eventChoice, setEventChoice, brief, onNext}){
  const isPersonal = mode === "personal";
  const picked = eventChoice !== null ? eventData.options[eventChoice] : null;
  return (
    <div className="fade-in">
      <div className="eyebrow">Step 6 · Expect the Unexpected</div>
      <h2 className="headline" style={{fontSize:26}}>Real strategy is tested in the moment</h2>
      <p className="sub">
        Plans matter, but marketing rarely goes exactly to plan. How {isPersonal ? "you" : "a brand"} respond to a
        sudden moment says as much about strategy as the roadmap itself.
      </p>

      <div className="event-box">
        <div className="event-flash">⚡ {eventData.flash}</div>
        <div className="event-text">{eventData.text}</div>

        {eventData.options.map((opt, i)=>(
          <button key={i} className={"option-btn " + (eventChoice===i ? "picked":"")} onClick={()=>setEventChoice(i)}>
            {opt.label}
          </button>
        ))}

        {picked && (
          <div className="consequence">
            <b style={{color:"var(--ink)"}}>What happens next: </b>{picked.consequence}
          </div>
        )}
      </div>

      <ClaudeCard
        title="Thinking through a crisis or opportunity moment"
        prompt={isPersonal
          ? `I'm ${brief.name}, and this just happened: [describe the event]. As my strategist, walk me through 2-3 possible responses and the tradeoffs of each before I act.`
          : `My business ${brief.name} just experienced this: [describe the event]. Help me think through response options and the pros and cons of each before responding publicly.`}
      />

      <div className="btn-row">
        <button className="btn" disabled={eventChoice===null} onClick={onNext}>
          {eventChoice===null ? "Choose a response to continue" : "See the Growth Report →"}
        </button>
      </div>
    </div>
  );
}

/* ---------------- REPORT STAGE ---------------- */

function ReportStage({mode, brief, selectedPlatforms, platformPool, selectedPillars, pillarPool, eventData, eventChoice, onRestart, onNewRandom}){
  const isPersonal = mode === "personal";
  const chosenPlatforms = platformPool.filter(p=>selectedPlatforms.includes(p.id));
  const chosenPillars = pillarPool.filter(p=>selectedPillars.includes(p.id));
  const bestPlatform = chosenPlatforms.find(p=>p.weight==="high") || chosenPlatforms[0];
  const weakestPlatform = chosenPlatforms.find(p=>p.weight==="low");
  const pickedEventOption = eventChoice!==null ? eventData.options[eventChoice] : null;

  const lessons = isPersonal ? [
    "Authenticity beats polish — an audience follows a real, consistent point of view far longer than a manufactured persona.",
    "Consistency compounds — showing up on a predictable rhythm builds more trust over time than occasional bursts of high-effort content.",
    "Niche clarity attracts the right people — being known for one clear thing brings in a smaller but far more loyal audience than trying to appeal to everyone.",
  ] : [
    "Audience understanding comes before content — knowing exactly who you're for makes every later decision easier and faster.",
    "Fewer, well-chosen platforms and pillars beat spreading thin — depth and consistency build more trust than being everywhere at once.",
    "Unexpected moments are strategy tests, not distractions — how a brand responds under pressure often shapes perception more than the planned content does.",
  ];

  return (
    <div className="fade-in">
      <div className="eyebrow">Final Step · Growth Report</div>
      <h2 className="headline" style={{fontSize:26}}>Growth Report: {isPersonal ? brief.name : brief.name}</h2>
      <p className="sub">Here's how this run played out, and what it reveals about strategic thinking.</p>

      <div className="report-grid">
        <div className="report-item">
          <h4>Audience Understanding</h4>
          <p>{isPersonal
            ? `You're speaking to people who want to learn about ${brief.niche} from someone with a real, credible story — not a faceless institution.`
            : `This brand serves ${brief.audience}, and every decision above was measured against whether it addressed: "${brief.challenge}".`}</p>
        </div>
        <div className="report-item">
          <h4>Platform Strategy</h4>
          <p>You focused on {chosenPlatforms.map(p=>p.name).join(", ") || "no platforms selected"}.
          {bestPlatform ? ` ${bestPlatform.name} is likely your strongest lever based on fit.` : ""}
          {weakestPlatform ? ` ${weakestPlatform.name} may need extra justification given its weaker natural fit.` : ""}</p>
        </div>
        <div className="report-item">
          <h4>Content Strategy</h4>
          <p>Your three pillars — {chosenPillars.map(p=>p.title).join(", ") || "none selected"} — mainly drive {chosenPillars.map(p=>p.goal).join(", ") || "no clear goals"}. A balanced pillar mix like this supports both short-term engagement and long-term trust.</p>
        </div>
        <div className="report-item">
          <h4>Growth Potential</h4>
          <p>{isPersonal
            ? "With consistent posting on a focused platform set and a clear POV, this brand has a realistic path to a small, loyal, high-trust audience within a few months."
            : "With the current platform and pillar focus, this brand can expect gradual, compounding growth — assuming consistency is maintained past the first month."}</p>
        </div>
        <div className="report-item">
          <h4>Best Decision</h4>
          <p>{pickedEventOption ? `Choosing to "${pickedEventOption.label.toLowerCase()}" during the unexpected event showed good judgment under pressure.` : "Selecting a focused set of platforms and pillars instead of trying to cover everything."}</p>
        </div>
        <div className="report-item">
          <h4>Biggest Risk to Watch</h4>
          <p>{weakestPlatform ? `Investing effort into ${weakestPlatform.name} despite its weaker natural fit could dilute focus if not deliberately justified.` : "Losing consistency after the initial 30-day push is the most common way strategies like this quietly fail."}</p>
        </div>
      </div>

      <div className="card" style={{marginTop:18}}>
        <div className="eyebrow" style={{marginBottom:10}}>Three Marketing Lessons</div>
        {lessons.map((l,i)=>(
          <div className="lesson" key={i}>
            <div className="lesson-num">{i+1}</div>
            <div style={{fontSize:14, color:"var(--ink-dim)", lineHeight:1.6}}>{l}</div>
          </div>
        ))}
      </div>

      <ClaudeCard
        title="Turning this report into a real plan"
        prompt={isPersonal
          ? `I'm ${brief.name}, focused on ${brief.niche}. Based on this growth report [paste report], help me write a simple one-page personal brand plan I can actually follow for the next 30 days.`
          : `My business is ${brief.name}. Based on this growth report [paste report], help me turn it into a simple one-page marketing plan with concrete next steps.`}
      />

      <div className="btn-row">
        <button className="btn" onClick={onNewRandom}>🎲 Try a New Random Client</button>
        <button className="btn ghost" onClick={onRestart}>Restart From the Beginning</button>
      </div>
    </div>
  );
}

/* ---------------- MOUNT ---------------- */

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
