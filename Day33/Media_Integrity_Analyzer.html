<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Media Integrity Analyzer</title>
<style>
  :root{
    --bg-0:#0a0a0d;
    --bg-1:#121216;
    --card:#18181e;
    --card-hover:#1f1f27;
    --border:rgba(255,255,255,0.08);
    --text-main:#eef0f5;
    --text-dim:#9498a8;
    --accent:#da7756;
    --accent-2:#f0a380;
    --good:#3ddc97;
    --warn:#ffb648;
    --bad:#ff5c72;
    --shadow:0 12px 34px rgba(0,0,0,0.45);
    --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;min-height:100vh;
    background:
      radial-gradient(circle at 12% 8%, rgba(218,119,86,0.10), transparent 42%),
      radial-gradient(circle at 88% 92%, rgba(218,119,86,0.07), transparent 42%),
      var(--bg-0);
    color:var(--text-main);
    font-family:'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
  }
  #app{max-width:1000px;margin:0 auto;padding:32px 20px 90px;}
  h1{font-size:30px;margin:0 0 10px;letter-spacing:0.2px;}
  h2{font-size:22px;margin:0 0 10px;}
  h3{font-size:17px;margin:0 0 8px;}
  p{line-height:1.65;color:var(--text-dim);margin:0 0 12px;}
  .lead{color:var(--text-main);font-size:16px;}
  strong{color:var(--text-main);}

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:30px;
    box-shadow:var(--shadow);
    animation:fadeUp .45s ease;
    margin-bottom:22px;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

  .btn{
    display:inline-flex;align-items:center;gap:8px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    color:#1a1006;border:none;padding:13px 26px;border-radius:12px;
    font-size:15px;font-weight:700;cursor:pointer;
    transition:transform .18s ease, box-shadow .18s ease;
    box-shadow:0 8px 22px rgba(218,119,86,0.30);
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(218,119,86,0.45);}
  .btn:active{transform:translateY(0) scale(.98);}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}
  .btn.secondary{
    background:rgba(255,255,255,0.06);color:var(--text-main);
    box-shadow:none;border:1px solid var(--border);
  }
  .btn.secondary:hover{background:rgba(255,255,255,0.1);}

  .concept-box{
    background:rgba(218,119,86,0.08);
    border:1px solid rgba(218,119,86,0.28);
    border-left:4px solid var(--accent);
    border-radius:14px;padding:18px 20px;margin-bottom:18px;
  }
  .why-box{
    background:rgba(124,140,255,0.06);
    border:1px solid rgba(140,160,255,0.22);
    border-left:4px solid #8ca0ff;
    border-radius:14px;padding:18px 20px;margin-bottom:22px;
  }
  .tag{
    font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:800;
    display:block;margin-bottom:6px;
  }
  .concept-box .tag{color:var(--accent);}
  .why-box .tag{color:#8ca0ff;}

  .theme-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:20px 0;
  }
  .theme-card{
    border-radius:16px;padding:18px;cursor:pointer;
    border:2px solid var(--border);
    transition:transform .18s ease, border .18s ease;
    text-align:center;
    background:var(--bg-1);
  }
  .theme-card:hover{transform:translateY(-4px);}
  .theme-card.selected{border-color:#fff;}
  .swatch{
    width:100%;height:44px;border-radius:10px;margin-bottom:10px;
  }
  .theme-card .name{font-weight:700;font-size:14px;}

  .options-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:18px 0;}
  .option-card{
    background:var(--bg-1);border:1px solid var(--border);border-radius:14px;padding:16px;
    cursor:pointer;text-align:center;font-weight:700;font-size:15px;
    transition:transform .2s ease, border .2s ease, background .2s ease;
  }
  .option-card:hover{transform:translateY(-3px);border-color:var(--accent);background:var(--card-hover);}
  .option-card.selected{border-color:var(--accent);background:rgba(218,119,86,0.15);}

  .article-box{
    background:var(--bg-1);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:20px;
  }
  .headline{font-size:22px;font-weight:800;margin-bottom:10px;line-height:1.3;}
  .byline{font-size:12px;color:var(--text-dim);margin-bottom:14px;text-transform:uppercase;letter-spacing:0.5px;}
  .article-body{font-size:14.5px;color:#c7cad6;line-height:1.7;}

  .word-chip{
    display:inline-block;padding:2px 6px;margin:0 2px;border-radius:6px;
    background:rgba(255,182,72,0.18);border:1px solid rgba(255,182,72,0.4);
    cursor:pointer;transition:background .15s ease;
  }
  .word-chip:hover{background:rgba(255,182,72,0.32);}
  .word-chip.picked{background:rgba(255,92,114,0.28);border-color:rgba(255,92,114,0.55);}

  .textarea-wrap textarea{
    width:100%;min-height:80px;background:var(--bg-1);border:1px solid var(--border);
    border-radius:12px;color:var(--text-main);padding:14px;font-size:14px;font-family:inherit;
    resize:vertical;
  }
  .textarea-wrap textarea:focus{outline:none;border-color:var(--accent);}

  .reveal-box{
    margin-top:20px;background:rgba(61,220,151,0.07);
    border:1px solid rgba(61,220,151,0.28);border-left:4px solid var(--good);
    border-radius:14px;padding:20px;animation:fadeUp .4s ease;
  }
  .reveal-box .tag{color:var(--good);}
  .score-line{
    display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap;
  }
  .score-badge{

  }

  }

    display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:22px 0;

  .metric-value{font-size:15px;font-weight:800;}

  .step-pill{
    font-size:12px;color:var(--text-dim);background:rgba(255,255,255,0.04);

  }

    width:170px;height:170px;border-radius:50%;display:flex;align-items:center;justify-content:center;

  }
  .score-ring::before{content:"";position:absolute;width:130px;height:130px;border-radius:50%;background:var(--card);}
  .score-ring .score-num{position:relative;z-index:1;font-size:40px;font-weight:900;}
  .score-suffix{font-size:13px;color:var(--text-dim);margin-top:-8px;}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:14px;}
  .list-box{background:var(--bg-1);border:1px solid var(--border);border-radius:14px;padding:16px 18px;}
  .list-box ul{margin:0;padding-left:18px;}
  .list-box li{margin-bottom:8px;color:var(--text-main);font-size:14px;}

  .risk-callout{
    background:rgba(255,92,114,0.08);border:1px solid rgba(255,92,114,0.3);
    border-left:4px solid var(--bad);border-radius:14px;padding:16px 18px;margin:18px 0;
  }
  .risk-callout .tag{color:var(--bad);}

  .habit-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:14px;}
  .habit-card{background:var(--bg-1);border:1px solid var(--border);border-radius:14px;padding:16px 18px;}
  .habit-card .num{
    display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));font-size:12px;font-weight:800;color:#1a1006;margin-bottom:10px;
  }

  .footer-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:26px;flex-wrap:wrap;}

  .instruction-note{font-size:13px;color:var(--text-dim);margin-top:-4px;margin-bottom:14px;}

  @media (max-width:700px){
    .two-col{grid-template-columns:1fr;}
    .score-hero{justify-content:center;}
    h1{font-size:24px;}
    .card{padding:22px;}
  }
</style>

function el(tag, className, html){
  const e = document.createElement(tag);
  if (className) e.className = className;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

function topProgress(stepIndex, total){
  const wrap = el("div", "progress-track-top");
  for (let i=0;i<total;i++){
    const seg = el("div","progress-seg");
    const fill = el("div","fill");
    fill.style.width = (i <= stepIndex ? "100%" : "0%");
    seg.appendChild(fill);
    wrap.appendChild(seg);
  }
  return wrap;
}

function metricsPanel(){
  const panel = el("div","metrics-panel");
  const defs = [
    { key:"headlineAccuracy", label:"Headline Accuracy", sub:"Higher = headlines matched their stories" },
    { key:"sourceReliability", label:"Source Reliability", sub:"Higher = claims were well-supported" },
    { key:"emotionalManipulation", label:"Emotional Manipulation", sub:"Higher = more manipulative techniques found", invert:true },
    { key:"audienceTargeting", label:"Audience Targeting Awareness", sub:"Higher = you spotted targeting tactics" }
  ];
  defs.forEach(function(def){
    const value = state.metrics[def.key];
    const card = el("div","metric-card");
    const top = el("div","metric-top");
    top.appendChild(el("span","metric-name", def.label));
    top.appendChild(el("span","metric-value", value));
    card.appendChild(top);
    const track = el("div","bar-track");
    const fill = el("div","bar-fill");
    fill.style.width = value + "%";
    let color = "#3ddc97";
    const goodness = def.invert ? (100-value) : value;
    if (goodness < 40) color = "#ff5c72";
    else if (goodness < 65) color = "#ffb648";
    fill.style.background = color;
    track.appendChild(fill);
    card.appendChild(track);
    card.appendChild(el("div","metric-sub", def.sub));
    panel.appendChild(card);
  });
  return panel;
}

========================================================= */
function renderThemeScreen(){
  const card = el("div","card");
  card.appendChild(el("h1", null, "🕵️ Media Integrity Analyzer"));
  card.appendChild(el("p","lead","Before we begin, pick a color theme for your session. This is purely visual and won't affect the lesson."));

  const grid = el("div","theme-grid");
  THEMES.forEach(function(theme){
    const tc = el("div","theme-card");
    if (state.theme && state.theme.id === theme.id) tc.classList.add("selected");
    const sw = el("div","swatch");
    sw.style.background = "linear-gradient(135deg,"+theme.accent+","+theme.accent2+")";
    tc.appendChild(sw);
    tc.appendChild(el("div","name", theme.name));
    tc.addEventListener("click", function(){
      state.theme = theme;
      applyTheme(theme);
      render();
    });
    grid.appendChild(tc);
  });
  card.appendChild(grid);

  const btn = el("button","btn","Continue →");
  btn.disabled = !state.theme;
  btn.addEventListener("click", function(){
    if (!state.theme) return;
    state.screen = "welcome";
    render();
  });
  card.appendChild(btn);
  return card;
}

/* =========================================================

========================================================= */
function renderChallenge1(){
  const holder = el("div");
  holder.appendChild(topProgress(1,5));

  const card = el("div","card");
  card.appendChild(el("span","step-pill","Challenge 1 of 2 — Headline Detective"));

  const scenario = state.headline;
  const box = el("div","article-box");
  box.appendChild(el("div","headline", scenario.headline));
  box.appendChild(el("div","byline", scenario.byline));

  // Build article body with clickable words for "misleading parts" identification
  const bodyEl = el("div","article-body");
  const words = scenario.body.split(" ");
  words.forEach(function(word, idx){
    const span = document.createElement("span");
    span.textContent = word + (idx < words.length-1 ? " " : "");
    span.style.cursor = "pointer";
    span.addEventListener("mouseenter", function(){ span.style.background = "rgba(218,119,86,0.15)"; span.style.borderRadius = "4px"; });
    span.addEventListener("mouseleave", function(){
      if (!span.classList.contains("picked-word")) { span.style.background = "transparent"; }
    });
    span.addEventListener("click", function(){
      span.classList.toggle("picked-word");
      if (span.classList.contains("picked-word")){
        span.style.background = "rgba(255,92,114,0.28)";
        span.style.borderRadius = "4px";
      } else {
        span.style.background = "transparent";
      }
    });
    bodyEl.appendChild(span);
  });
  box.appendChild(bodyEl);
  card.appendChild(box);

  card.appendChild(el("p", null, "<strong>Step 1:</strong> Based on the headline alone, would you click this article?"));
  const optWrap = el("div","options-grid");
  ["Yes","Maybe","No"].forEach(function(choice){
    const opt = el("div","option-card", choice);
    if (state.c1.clickChoice === choice) opt.classList.add("selected");
    opt.addEventListener("click", function(){
      state.c1.clickChoice = choice;
      render();
    });
    optWrap.appendChild(opt);
  });
  card.appendChild(optWrap);

  card.appendChild(el("p", "instruction-note", "Step 2: In the article text above, click on any words or phrases you think are exaggerated or don't match reality. Then continue below."));

  const btn = el("button","btn","Reveal the Analysis →");
  btn.disabled = !state.c1.clickChoice;
  btn.addEventListener("click", function(){
    state.screen = "reveal1";
    render();
  });
  card.appendChild(btn);

  holder.appendChild(card);
  holder.appendChild(el("h3", null, "Live Media Integrity Metrics"));
  holder.appendChild(metricsPanel());
  return holder;
}

/* =========================================================

========================================================= */
function renderReveal1(){
  // Apply metric effects once (on first render of reveal screen)
  if (!state.c1.accuracyGuessDone){
    const scenario = state.headline;
    state.metrics.headlineAccuracy = clamp(Math.round((state.metrics.headlineAccuracy + scenario.accuracy) / 2));
    state.metrics.sourceReliability = clamp(state.metrics.sourceReliability - (100 - scenario.accuracy) * 0.15);
    state.metrics.emotionalManipulation = clamp(state.metrics.emotionalManipulation + (100 - scenario.accuracy) * 0.2);
    state.c1.accuracyGuessDone = true;
  }

  const holder = el("div");
  holder.appendChild(topProgress(2,5));

  const card = el("div","card");
  card.appendChild(el("span","step-pill","Challenge 1 — Analysis"));
  card.appendChild(el("h2", null, "📊 Headline Accuracy Reveal"));

  const scenario = state.headline;

  const reveal = el("div","reveal-box");
  reveal.appendChild(el("span","tag","Headline Accuracy Score"));
  const scoreLine = el("div","score-line");
  const badge = el("div","score-badge", scenario.accuracy + " / 100");
  badge.style.color = scenario.accuracy >= 65 ? "#3ddc97" : (scenario.accuracy >= 40 ? "#ffb648" : "#ff5c72");
  scoreLine.appendChild(badge);
  const responseNote = el("div", null, "You said you'd " + (state.c1.clickChoice === "Yes" ? "click it" : (state.c1.clickChoice === "No" ? "skip it" : "maybe click it")) + ".");
  responseNote.style.color = "var(--text-dim)";
  scoreLine.appendChild(responseNote);
  reveal.appendChild(scoreLine);

  reveal.appendChild(el("p", null, "This score reflects how well the headline actually matched the substance of the article. A low score means the headline used dramatic or misleading language that the story itself doesn't support."));
  card.appendChild(reveal);

  card.appendChild(el("h3", null, "Highlighted Mismatches"));
  const mismatchRow = el("div","mismatch-row");
  scenario.mismatches.forEach(function(m){
    const tile = el("div","mismatch-tile");
    tile.appendChild(el("div","lbl","Misleading phrase"));
    tile.appendChild(el("div", null, "<strong>" + m.part + "</strong>"));
    const explain = el("div", null, m.issue);
    explain.style.marginTop = "8px";
    explain.style.fontSize = "13px";
    explain.style.color = "var(--text-dim)";
    tile.appendChild(explain);
    mismatchRow.appendChild(tile);
  });
  card.appendChild(mismatchRow);

  const rewriteBox = el("div","rewrite-box");
  rewriteBox.appendChild(el("span","tag","A Fair, Accurate Headline Would Be:"));
  rewriteBox.appendChild(el("p", null, "<strong>\"" + scenario.fairHeadline + "\"</strong>"));
  card.appendChild(rewriteBox);

  const takeaway = el("div","takeaway-box");
  takeaway.appendChild(el("span","tag","Key Takeaway"));
  takeaway.appendChild(el("p", null, scenario.keyTakeaway));
  card.appendChild(takeaway);

  const footer = el("div","footer-actions");
  const btn = el("button","btn","Continue to Challenge 2 →");
  btn.addEventListener("click", function(){
    state.emotion = pickRandom(EMOTION_SCENARIOS);
    state.screen = "intro2";
    render();
  });
  footer.appendChild(btn);
  card.appendChild(footer);

  holder.appendChild(card);
  holder.appendChild(el("h3", null, "Live Media Integrity Metrics"));
  holder.appendChild(metricsPanel());
  return holder;
}

function computeOverallScore(){
  const m = state.metrics;
  const goodness = (m.headlineAccuracy + m.sourceReliability + (100 - m.emotionalManipulation) + m.audienceTargeting) / 4;
  return Math.round(goodness);
}

function renderDashboard(){
  const holder = el("div");
  const card = el("div","card");
  card.appendChild(el("span","step-pill","Final Report"));
  card.appendChild(el("h2", null, "📋 Media Integrity Dashboard"));
  card.appendChild(el("p", null, "Here's a summary of what you observed and learned across both challenges."));

  const score = computeOverallScore();
  let scoreColor = "#ff5c72";
  if (score >= 70) scoreColor = "#3ddc97";
  else if (score >= 45) scoreColor = "#ffb648";

  const hero = el("div","score-hero");
  const ringWrap = el("div","score-ring-wrap");
  const ring = el("div","score-ring");
  ring.style.setProperty("--score-pct", score);
  ring.style.setProperty("--score-color", scoreColor);
  const num = el("div","score-num", score);
  num.style.color = scoreColor;
  ring.appendChild(num);
  ringWrap.appendChild(ring);
  ringWrap.appendChild(el("div","score-suffix","Media Integrity Score / 100"));
  hero.appendChild(ringWrap);

  const heroText = el("div", null);
  heroText.style.flex = "1";
  heroText.style.minWidth = "260px";
  let summary = "";
  if (score >= 70){
    summary = "You did a strong job separating factual substance from sensational framing. You noticed mismatches between headlines and content, and picked up on emotional language used to provoke a reaction.";
  } else if (score >= 45){
    summary = "You caught some of the manipulation techniques in these scenarios, but a few dramatic phrases likely still landed as intended. With a bit more practice, spotting these patterns will become automatic.";
  } else {
    summary = "These scenarios were built with strong manipulation techniques, and it's completely normal to be affected by them — that's exactly why they work on so many people. The goal now is simply awareness for next time.";
  }
  heroText.appendChild(el("p", null, summary));
  hero.appendChild(heroText);
  card.appendChild(hero);

  card.appendChild(el("h3", null, "Final Metrics"));
  card.appendChild(metricsPanel());

  const twoCol = el("div","two-col");

  const learnedBox = el("div","list-box");
  learnedBox.appendChild(el("h3", null, "📚 What You Learned"));
  const ul1 = document.createElement("ul");
  ul1.appendChild(el("li", null, "Headlines can be written to exaggerate a story far beyond what the actual article supports."));
  ul1.appendChild(el("li", null, "Emotionally charged words like \"" + (state.emotion.emotionalPhrases[0] || "") + "\" are often chosen deliberately to provoke sharing or clicking."));
  ul1.appendChild(el("li", null, "Content is frequently built around a specific target audience's fears, hopes, or identity."));
  learnedBox.appendChild(ul1);
  twoCol.appendChild(learnedBox);

  const redFlagBox = el("div","list-box");
  redFlagBox.appendChild(el("h3", null, "🚩 Biggest Red Flag Encountered"));
  const worstKey = (function(){
    const m = state.metrics;
    const candidates = [
      { key:"headlineAccuracy", goodness: m.headlineAccuracy, label:"a headline that didn't match its article" },
      { key:"sourceReliability", goodness: m.sourceReliability, label:"claims lacking credible sourcing" },
      { key:"emotionalManipulation", goodness: 100 - m.emotionalManipulation, label:"heavy use of emotionally manipulative language" },
      { key:"audienceTargeting", goodness: m.audienceTargeting >= 0 ? 100 : 0, label:"content narrowly targeted at a specific audience's emotions" }
    ];
    candidates.sort(function(a,b){ return a.goodness - b.goodness; });
    return candidates[0];
  })();
  redFlagBox.appendChild(el("p", null, "The clearest warning sign in this session was <strong>" + worstKey.label + "</strong>. In real media, this is often the first clue that content is prioritizing engagement over accuracy."));
  twoCol.appendChild(redFlagBox);

  card.appendChild(twoCol);

  const risk = el("div","risk-callout");
  risk.appendChild(el("span","tag","Remember"));
  risk.appendChild(el("p", null, "Manipulative techniques work on everyone at first glance — even experts. The goal isn't to become suspicious of everything, but to pause, notice strong emotional reactions, and check whether the actual substance supports the framing."));
  card.appendChild(risk);

  card.appendChild(el("h3", null, "🛠️ Three Practical Media Literacy Habits"));
  const habitGrid = el("div","habit-grid");
  const habits = [
    "Before reacting to a headline, read past the first paragraph to see if the details actually support it.",
    "When you notice a strong emotional pull — fear, anger, excitement — pause and ask who benefits from you feeling that way right now.",
    "Check who is quoted and what evidence is given. Vague phrases like \"experts say\" or \"studies show\" without names or links are a signal to dig deeper."
  ];
  habits.forEach(function(h, i){
    const hc = el("div","habit-card");
    hc.appendChild(el("div","num", (i+1)));
    hc.appendChild(el("p", null, h));
    habitGrid.appendChild(hc);
  });
  card.appendChild(habitGrid);

  const footer = el("div","footer-actions");
  const replayBtn = el("button","btn secondary","🔄 Replay With New Scenarios");
  replayBtn.addEventListener("click", function(){
    resetState();
    render();
  });
  footer.appendChild(replayBtn);
  card.appendChild(footer);

  holder.appendChild(card);
  return holder;
}

========================================================= */
function resetState(){
  const keepTheme = state.theme;
  state = {
    screen: "welcome",

    headline: null,
    emotion: null,

    c1: { clickChoice: null, pickedWords: [], accuracyGuessDone: false },
    c2: { feeling: "", pickedWords: [] }
  };
  c2MetricsApplied = false;
}

/* =========================================================
   INIT
========================================================= */
render();
