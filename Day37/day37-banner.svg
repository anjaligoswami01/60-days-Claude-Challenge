<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow1" cx="15%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#D97757" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D97757" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="88%" cy="92%" r="55%">
      <stop offset="0%" stop-color="#e0a458" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#e0a458" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#e0a458"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#26201c"/>
      <stop offset="100%" stop-color="#1d1815"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#161210"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Day badge -->
  <rect x="60" y="56" width="168" height="42" rx="21" fill="rgba(217,119,87,0.15)" stroke="#D97757" stroke-width="1"/>
  <text x="144" y="83" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#e0a458" letter-spacing="1">DAY 37 / 60</text>

  <!-- Title -->
  <text x="60" y="200" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#f2ece6">Task Compass</text>
  <text x="60" y="248" font-family="Georgia, serif" font-size="30" fill="#D97757" font-style="italic">Café / Restaurant Edition</text>

  <!-- subtitle -->
  <text x="60" y="292" font-family="Arial, sans-serif" font-size="19" fill="#b8aca2">A single-file HTML simulation teaching ownership, delegation,</text>
  <text x="60" y="318" font-family="Arial, sans-serif" font-size="19" fill="#b8aca2">routing &amp; collaboration — built for the 60 Days Claude AI Challenge</text>

  <!-- 3 stage pills -->
  <g font-family="Arial, sans-serif" font-size="16" font-weight="600">
    <rect x="60" y="356" width="230" height="46" rx="23" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)"/>
    <text x="82" y="385" fill="#f2ece6">🎯 Who Owns This?</text>

    <rect x="304" y="356" width="200" height="46" rx="23" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)"/>
    <text x="326" y="385" fill="#f2ece6">🔄 Task Routing</text>

    <rect x="518" y="356" width="240" height="46" rx="23" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)"/>
    <text x="540" y="385" fill="#f2ece6">🤝 Collaboration</text>
  </g>

  <!-- role chips illustration -->
  <g font-family="Arial, sans-serif" font-size="15" font-weight="600">
    <rect x="60" y="432" width="118" height="52" rx="14" fill="url(#cardGrad)" stroke="#D97757" stroke-width="1.4"/>
    <text x="119" y="453" text-anchor="middle" font-size="20">☕</text>
    <text x="119" y="472" text-anchor="middle" fill="#e6ddd6" font-size="12">Barista</text>

    <rect x="190" y="432" width="118" height="52" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.1)"/>
    <text x="249" y="453" text-anchor="middle" font-size="20">🍽️</text>
    <text x="249" y="472" text-anchor="middle" fill="#e6ddd6" font-size="12">Server</text>

    <rect x="320" y="432" width="118" height="52" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.1)"/>
    <text x="379" y="453" text-anchor="middle" font-size="20">👨‍🍳</text>
    <text x="379" y="472" text-anchor="middle" fill="#e6ddd6" font-size="12">Head Chef</text>

    <rect x="450" y="432" width="118" height="52" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.1)"/>
    <text x="509" y="453" text-anchor="middle" font-size="20">📋</text>
    <text x="509" y="472" text-anchor="middle" fill="#e6ddd6" font-size="12">Manager</text>

    <rect x="580" y="432" width="118" height="52" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.1)"/>
    <text x="639" y="453" text-anchor="middle" font-size="20">🏛️</text>
    <text x="639" y="472" text-anchor="middle" fill="#e6ddd6" font-size="12">Owner</text>
  </g>

  <!-- footer bar -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(255,255,255,0.03)"/>
  <text x="60" y="601" font-family="Arial, sans-serif" font-size="17" fill="#b8aca2">#60DaysClaudeChallenge   #BuildInPublic   #AIProductivity   #ClaudeAI</text>
  <circle cx="1090" cy="595" r="26" fill="url(#accentGrad)"/>
  <text x="1090" y="602" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1a1310">TC</text>
</svg>
